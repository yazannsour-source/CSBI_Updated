<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Icon mark: interlocking C + leaf/growth symbol -->
  <g transform="translate(8, 8)">
    <!-- Outer arc of C -->
    <path d="M32 4 C16 4 4 16 4 32 C4 48 16 60 32 60" stroke="#1a5c3a" stroke-width="7" stroke-linecap="round" fill="none"/>
    <!-- Inner arc -->
    <path d="M32 16 C23 16 16 23 16 32 C16 41 23 48 32 48" stroke="#2e7d52" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Leaf growing upward from center -->
    <path d="M32 44 C32 44 32 28 44 18 C44 18 38 28 32 44Z" fill="#4caf7d"/>
    <path d="M32 44 C32 44 32 30 20 22 C20 22 26 30 32 44Z" fill="#2e7d52"/>
    <!-- Stem -->
    <line x1="32" y1="58" x2="32" y2="44" stroke="#1a5c3a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Gold accent dot -->
    <circle cx="48" cy="16" r="4" fill="#c9a84c"/>
  </g>

  <!-- Wordmark -->
  <text x="86" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#1a5c3a" letter-spacing="2">CSBI</text>

  <!-- Divider line -->
  <line x1="86" y1="42" x2="308" y2="42" stroke="#c9a84c" stroke-width="1.2"/>

  <!-- Subtitle -->
  <text x="86" y="57" font-family="Arial, Helvetica, sans-serif" font-size="8.5" fill="#2e7d52" letter-spacing="1.5" font-weight="500">CENTRE FOR SUSTAINABLE BUSINESS</text>
  <text x="86" y="69" font-family="Arial, Helvetica, sans-serif" font-size="8.5" fill="#2e7d52" letter-spacing="1.5" font-weight="500">&amp; INNOVATION  ·  PMU</text>
</svg>
